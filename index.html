<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión Pro</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="container">
        <div class="login-box">
            <div class="header-section">
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Gestión Pro</h1>
                <p class="badge">ADMINISTRADOR</p>
            </div>

            <div class="card">
                <h2>Bienvenido</h2>
                <p class="subtitle">Ingrese sus credenciales para continuar.</p>

                <form id="formLogin">
                    <div class="input-group">
                        <label>Correo electrónico</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail" class="prefix-icon"></i>
                            <input type="email" id="email" placeholder="nombre@gestionpro.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="label-row">
                            <label>Contraseña</label>
                            <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
                        </div>
                        <div class="input-wrapper">
                            <i data-lucide="lock" class="prefix-icon"></i>
                            <input type="password" id="password" placeholder="************" required>
                            <button type="button" id="togglePassword" class="suffix-btn">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="recordar" checked>
                            <span class="checkmark"></span>
                            Recordar sesión
                        </label>
                    </div>

                    <div id="mensajeLogin" class="error-msg"></div>

                    <button type="submit" id="btnLogin" class="btn-primary">
                        <span>Ingresar</span>
                        <i data-lucide="arrow-right"></i>
                    </button>
                </form>

                <p class="copyright">© 2026 Gestión Pro Sistema de Administración</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
